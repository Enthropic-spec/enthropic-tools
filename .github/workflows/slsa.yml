name: SLSA Provenance

on:
  release:
    types: [published]

permissions: read-all

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    outputs:
      binary-digest: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Build release
        run: cargo build --release

      - name: Compute hash
        id: hash
        run: |
          sha256sum target/release/enthropic > checksums.txt
          echo "hash=$(base64 -w0 checksums.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: enthropic-linux-amd64
          path: |
            target/release/enthropic
            checksums.txt
          if-no-files-found: error

  provenance:
    name: Generate SLSA provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.binary-digest }}
      upload-assets: true
