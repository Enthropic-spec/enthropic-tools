name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan repository (CRITICAL + HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  trivy-docker:
    name: Trivy Docker image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t enthropic:scan .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: enthropic:scan
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-docker.sarif
          exit-code: '0'

      - name: Upload Docker scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-docker.sarif
          category: trivy-docker

  cargo-geiger:
    name: Unsafe code audit (cargo-geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-geiger
        run: cargo install cargo-geiger --locked
      - name: Run geiger
        run: cargo geiger --all-features 2>&1 || true
